<!-- ═══════════════════════════════════════════════════════════ -->
<!--  PAGE LOADER — fetches all HTML fragments and injects them  -->
<!-- ═══════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  const BASE = 'https://ascovitahealthcare-cell-github-io.onrender.com';

  // Map: slot id → page file path
  const PAGES = [
    ['slot-header',         'pages/_shared_header.html'],
    ['slot-home',           'pages/home.html'],
    ['slot-advisor',        'pages/advisor.html'],
    ['slot-shop',           'pages/shop.html'],
    ['slot-product',        'pages/product.html'],
    ['slot-cart',           'pages/cart.html'],
    ['slot-checkout',       'pages/checkout.html'],
    ['slot-thankyou',       'pages/thankyou.html'],
    ['slot-blog',           'pages/blog.html'],
    ['slot-about',          'pages/about.html'],
    ['slot-b2b',            'pages/b2b.html'],
    ['slot-contact',        'pages/contact.html'],
    ['slot-faq',            'pages/faq.html'],
    ['slot-policies',       'pages/policies.html'],
    ['slot-wishlist',       'pages/wishlist.html'],
    ['slot-payment-failed', 'pages/payment_failed.html'],
    ['slot-accessibility',  'pages/accessibility.html'],
    ['slot-subscriptions',  'pages/subscriptions.html'],
    ['slot-account',        'pages/account.html'],
    ['slot-bundle',         'pages/_bundle_builder.html'],
    ['slot-modals',         'pages/_modals.html'],
    ['slot-footer',         'pages/_shared_footer.html'],
  ];

  // Load a single fragment
  function loadFragment(slotId, filePath) {
    return fetch(BASE + '/' + filePath)
      .then(function(r) {
        if (!r.ok) throw new Error('Failed: ' + filePath + ' (' + r.status + ')');
        return r.text();
      })
      .then(function(html) {
        var el = document.getElementById(slotId);
        if (el) el.innerHTML = html;
      })
      .catch(function(err) {
        console.warn('[PageLoader]', err.message);
      });
  }

  // Load all fragments, then init the app
  function loadAllPages() {
    var promises = PAGES.map(function(p) {
      return loadFragment(p[0], p[1]);
    });

    Promise.all(promises).then(function() {
      // Fire init event so app.js knows DOM is ready
      document.dispatchEvent(new Event('pagesLoaded'));
      // Re-run DOMContentLoaded-dependent init if needed
      if (typeof window.STORE !== 'undefined' && typeof window.STORE.init === 'function') {
        window.STORE.init();
      }
      // Trigger animations re-scan
      if (typeof window.initScrollReveal === 'function') {
        window.initScrollReveal();
      }
    });
  }

  // Start loading after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadAllPages);
  } else {
    loadAllPages();
  }
})();
</script>
