<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ascovita</title>
  <script>
    // GitHub Pages SPA fix — only redirect if not already on index
    (function() {
      var path = window.location.pathname;
      
      // Prevent infinite loop — if we came from a ?p= redirect already, stop
      if (window.location.search.indexOf('?p=') === 0) return;
      
      // Don't redirect root or index
      if (path === '/' || path === '/index.html') return;
 
      // Clean redirect — send path to index.html once
      var newUrl = '/?p=' + encodeURIComponent(path);
      window.location.replace(newUrl);
    })();
  </script>
</head>
<body></body>
</html>
